font_family MesloLGS Nerd Font Mono
font_size 12


background #2c4049
background_opacity 0.4



cursor_shape block
cursor_blink_interval 1

enable_audio_bell no
confirm_os_window_close 0

window_padding_width 10 20
tab_bar_style hidden
scrollback_lines 10000

foreground #ffffff
selection_foreground #fcfcfc
selection_background #799bb1
cursor #c8c3c3



color0  #3B4252
color1  #BF616A
color2  #A3BE8C
color3  #EBCB8B
color4  #81A1C1
color5  #B48EAD
color6  #88C0D0
color7  #E5E9F0

color8  #4C566A
color9  #BF616A
color10 #A3BE8C
color11 #EBCB8B
color12 #81A1C1
color13 #B48EAD
color14 #8FBCBB
color15 #ECEFF4




map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
allow_remote_control yes
